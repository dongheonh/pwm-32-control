<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microrobot CTRL 32 — SAM Lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e1e;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
      user-select: none;
    }

    h1 {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    #controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #3a3a3a;
      color: #eee;
      border: 1px solid #666;
      padding: 7px 18px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    button:hover { background: #4a4a4a; }
    button.connected { background: #1a4a1a; border-color: #3a8a3a; color: #7f7; }

    #status {
      font-size: 12px;
      color: #888;
      padding: 4px 10px;
      background: #111;
      border: 1px solid #333;
    }

    .legend {
      display: flex;
      gap: 24px;
      font-size: 11px;
      color: #aaa;
      margin-bottom: 8px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 14px; height: 14px; }
    .legend-dot.pos { background: rgba(255,0,0,0.85); }
    .legend-dot.neg { background: rgba(0,0,255,0.85); }

    #params {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 12px;
      padding: 8px 14px;
      background: #141414;
      border: 1px solid #333;
      flex-wrap: wrap;
      justify-content: center;
    }
    #params label { color: #777; }
    #params input[type=number] {
      width: 60px;
      background: #2a2a2a;
      border: 1px solid #555;
      color: #eee;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 3px 6px;
      text-align: right;
    }
    #params input[type=number]:focus {
      outline: 1px solid #888;
      background: #333;
    }
    .param-group { display: flex; align-items: center; gap: 6px; }
    .param-unit  { color: #555; font-size: 11px; }

    #grid {
      display: grid;
      grid-template-columns: repeat(8, 88px);
      grid-template-rows: repeat(4, 88px);
      gap: 2px;
      margin-bottom: 12px;
    }

    .cell {
      width: 88px;
      height: 88px;
      background: #505050;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cell:hover { outline: 1px solid #bbb; }
    .cell .lbl {
      position: absolute;
      bottom: 3px;
      right: 4px;
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
    }
    .cell .intensity {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      pointer-events: none;
    }

    #data-table {
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 10px;
    }
    #data-table td {
      border: 1px solid #464646;
      padding: 3px 10px;
      text-align: center;
      background: #0f0f0f;
      min-width: 46px;
      color: #ccc;
    }
    #data-table .row-lbl {
      background: #1a1a1a;
      color: #c8dca0;
      font-size: 11px;
      padding: 3px 8px;
    }

    .csv-row {
      font-size: 10px;
      word-break: break-all;
      max-width: 730px;
      padding: 4px 6px;
      background: #111;
      margin-bottom: 3px;
      border: 1px solid #222;
    }
    .csv-row .lbl { color: #555; }
    .csv-row .val-out { color: #888; }
    .csv-row .val-in  { color: #6af; }
  </style>
</head>
<body>

<h1>MICROROBOT CTRL 32 — SAM Lab / D.H. Han</h1>

<div id="controls">
  <button id="connectBtn" onclick="toggleConnect()">Connect Device</button>
  <button onclick="resetAll()">Reset All</button>
  <div id="status">Not connected — Chrome required for Web Serial</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot neg"></div>Left click: Negative (−)</div>
  <div class="legend-item"><div class="legend-dot pos"></div>Right click: Positive (+)</div>
</div>

<div id="params">
  <div class="param-group">
    <label for="inp-decay">Duration</label>
    <input type="number" id="inp-decay" value="3" min="0.5" max="120" step="0.5">
    <span class="param-unit">s</span>
  </div>
  <div class="param-group">
    <label for="inp-intens">Max intensity</label>
    <input type="number" id="inp-intens" value="10" min="1" max="10" step="1">
    <span class="param-unit">[1–10]</span>
  </div>
  <span style="color:#555">|&nbsp; hold 0.5s fixed &nbsp;|&nbsp; 4×8 grid &nbsp;|&nbsp; 10 Hz &nbsp;|&nbsp; 115200 baud</span>
</div>

<div id="grid"></div>

<table id="data-table"><tbody id="table-body"></tbody></table>

<div class="csv-row">
  <span class="lbl">OUT: </span><span id="csv-out" class="val-out">—</span>
</div>
<div class="csv-row">
  <span class="lbl">IN:  </span><span id="csv-in" class="val-in">—</span>
</div>

<script>
  // ==================== Config ====================
  const ROWS    = 4;
  const COLS    = 8;
  const SEND_HZ = 10;
  const BAUD    = 115200;

  // Live config
  const HOLD_MS = 500; // fixed 0.5s hold
  function decayMs()   { return parseFloat(document.getElementById('inp-decay').value) * 1000; }
  function maxIntens() { return parseInt(document.getElementById('inp-intens').value, 10); }
  // ================================================

  // Grid state: each cell { pos, neg, tStart, polarity }
  let gs = Array.from({length: ROWS}, () =>
    Array.from({length: COLS}, () => ({ pos: 0, neg: 0, tStart: 0, polarity: null }))
  );

  // DOM refs
  const gridEl     = document.getElementById('grid');
  const tableBody  = document.getElementById('table-body');
  const csvOutEl   = document.getElementById('csv-out');
  const csvInEl    = document.getElementById('csv-in');
  const connectBtn = document.getElementById('connectBtn');
  const statusEl   = document.getElementById('status');

  let cellEls  = [];   // [row][col] → div.cell
  let tableTds = [];   // [row][col] → td
  let intEls   = [];   // [row][col] → span.intensity inside cell

  // Serial
  let port          = null;
  let writer        = null;
  let csvIn         = '—';
  let lastSentTime  = 0;

  // ---- Build DOM ----
  function buildDOM() {
    gridEl.innerHTML = '';
    tableBody.innerHTML = '';
    cellEls = []; tableTds = []; intEls = [];

    for (let i = 0; i < ROWS; i++) {
      // Pre-allocate arrays indexed by data column j
      const rowCells = new Array(COLS);
      const rowTds   = new Array(COLS);
      const rowInts  = new Array(COLS);
      const tr = document.createElement('tr');

      const lbl = document.createElement('td');
      lbl.className = 'row-lbl';
      lbl.textContent = i;
      tr.appendChild(lbl);

      // Render columns right-to-left visually (j=7 leftmost, j=0 rightmost)
      // so the grid is horizontally mirrored for wiring
      for (let jv = 0; jv < COLS; jv++) {
        const j = COLS - 1 - jv; // data column

        // Grid cell
        const cell = document.createElement('div');
        cell.className = 'cell';

        const intSpan = document.createElement('span');
        intSpan.className = 'intensity';
        cell.appendChild(intSpan);

        const lblSpan = document.createElement('span');
        lblSpan.className = 'lbl';
        lblSpan.textContent = `${i},${j}`;
        cell.appendChild(lblSpan);

        cell.addEventListener('mousedown', onCellClick);
        cell.addEventListener('contextmenu', e => e.preventDefault());

        gridEl.appendChild(cell);
        rowCells[j] = cell;
        rowInts[j]  = intSpan;

        // Table cell
        const td = document.createElement('td');
        td.textContent = '0/0';
        tr.appendChild(td);
        rowTds[j] = td;
      }

      cellEls.push(rowCells);
      tableTds.push(rowTds);
      intEls.push(rowInts);
      tableBody.appendChild(tr);
    }
  }

  // ---- Click handler ----
  function onCellClick(e) {
    e.preventDefault();
    const cell = e.currentTarget;
    const i = parseInt(cell.querySelector('.lbl').textContent.split(',')[0]);
    const j = parseInt(cell.querySelector('.lbl').textContent.split(',')[1]);
    const now = performance.now();
    const mi = maxIntens();

    if (e.button === 0) {
      gs[i][j] = { pos: 0, neg: mi, tStart: now, polarity: 'neg' };
    } else if (e.button === 2) {
      gs[i][j] = { pos: mi, neg: 0, tStart: now, polarity: 'pos' };
    }
  }

  // ---- Reset all ----
  function resetAll() {
    for (let i = 0; i < ROWS; i++)
      for (let j = 0; j < COLS; j++)
        gs[i][j] = { pos: 0, neg: 0, tStart: 0, polarity: null };
  }

  // ---- Decay update ----
  function updateDecay(now) {
    const dMs = decayMs();
    const mi  = maxIntens();
    const decayWindow = Math.max(0, dMs - HOLD_MS);

    for (let i = 0; i < ROWS; i++) {
      for (let j = 0; j < COLS; j++) {
        const c = gs[i][j];
        if (!c.tStart) continue;

        const elapsed = now - c.tStart;

        if (elapsed < HOLD_MS) {
          if (c.polarity === 'pos') { c.pos = mi; c.neg = 0; }
          else                      { c.neg = mi; c.pos = 0; }
        } else if (elapsed < dMs && decayWindow > 0) {
          const k = Math.max(0, 1 - (elapsed - HOLD_MS) / decayWindow);
          if (c.polarity === 'pos') { c.pos = mi * k; c.neg = 0; }
          else                      { c.neg = mi * k; c.pos = 0; }
        } else {
          c.pos = 0; c.neg = 0; c.tStart = 0; c.polarity = null;
        }
      }
    }
  }

  // ---- UI render ----
  function renderUI() {
    for (let i = 0; i < ROWS; i++) {
      for (let j = 0; j < COLS; j++) {
        const c   = gs[i][j];
        const cell = cellEls[i][j];
        const td   = tableTds[i][j];
        const isp  = intEls[i][j];

        const posI = Math.round(c.pos);
        const negI = Math.round(c.neg);

        const mi = maxIntens();
        if (c.pos > 0) {
          const a = Math.min(1, Math.max(0.1, c.pos / mi));
          cell.style.background = `rgba(255,0,0,${a.toFixed(2)})`;
          isp.textContent = `+${posI}`;
          td.style.color = '#f88';
        } else if (c.neg > 0) {
          const a = Math.min(1, Math.max(0.1, c.neg / mi));
          cell.style.background = `rgba(0,0,255,${a.toFixed(2)})`;
          isp.textContent = `−${negI}`;
          td.style.color = '#88f';
        } else {
          cell.style.background = '#505050';
          isp.textContent = '';
          td.style.color = '#555';
        }

        td.textContent = `${posI}/${negI}`;
      }
    }
  }

  // ---- Build CSV (64 values: pos,neg pairs in row-major order) ----
  function buildCSV() {
    const flat = [];
    for (let i = 0; i < ROWS; i++)
      for (let j = 0; j < COLS; j++) {
        flat.push(Math.round(gs[i][j].pos));
        flat.push(Math.round(gs[i][j].neg));
      }
    return flat.join(',');
  }

  // ---- Serial send ----
  async function sendSerial(csv) {
    if (!writer) return;
    try {
      await writer.write(new TextEncoder().encode(csv + '\n'));
    } catch(e) {
      console.error('Write error:', e);
    }
  }

  // ---- Main loop (rAF) ----
  function loop(now) {
    updateDecay(now);
    renderUI();

    const csv = buildCSV();
    csvOutEl.textContent = csv;
    csvInEl.textContent  = csvIn;

    if (writer && (now - lastSentTime) >= (1000 / SEND_HZ)) {
      sendSerial(csv);
      lastSentTime = now;
    }

    requestAnimationFrame(loop);
  }

  // ---- Serial connect / disconnect ----
  async function toggleConnect() {
    if (port) { await doDisconnect(); }
    else       { await doConnect();    }
  }

  async function doConnect() {
    if (!navigator.serial) {
      statusEl.textContent = 'Web Serial API not supported — use Chrome or Edge';
      return;
    }
    try {
      port = await navigator.serial.requestPort();
      await port.open({ baudRate: BAUD });

      // Read loop (echo from Arduino)
      const decoder = new TextDecoderStream();
      port.readable.pipeTo(decoder.writable);
      const rdReader = decoder.readable.getReader();
      (async () => {
        let buf = '';
        try {
          while (true) {
            const { value, done } = await rdReader.read();
            if (done) break;
            buf += value;
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const ln of lines)
              if (ln.trim()) csvIn = ln.trim();
          }
        } catch(_) { /* port closed */ }
      })();

      writer = port.writable.getWriter();

      connectBtn.textContent = 'Disconnect';
      connectBtn.classList.add('connected');
      statusEl.textContent = `Connected @ ${BAUD} baud`;
    } catch(e) {
      statusEl.textContent = 'Connect failed: ' + e.message;
      port = null;
    }
  }

  async function doDisconnect() {
    try {
      if (writer) { writer.releaseLock(); writer = null; }
      if (port)   { await port.close();   port   = null; }
    } catch(e) { console.error(e); }

    connectBtn.textContent = 'Connect Device';
    connectBtn.classList.remove('connected');
    statusEl.textContent = 'Disconnected';
    csvIn = '—';
  }

  // ---- Init ----
  buildDOM();
  requestAnimationFrame(loop);
</script>
</body>
</html>
